<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Vita | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff4d6d; --fundo: #fffafa; --white: #ffffff; --green: #25d366; --pix: #32bcad; }
        body { font-family: 'Poppins', sans-serif; background: var(--fundo); margin: 0; padding: 0; overflow-x: hidden; }

        header { 
            background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; 
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--pink); text-decoration: none; font-weight: bold; }
        .nav-right { display: flex; gap: 8px; align-items: center; }
        .btn-nav { background: none; border: 2px solid var(--pink); color: var(--pink); padding: 8px 12px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 12px; }
        #adm-btn { background: #333; color: white; border: none; display: none; }
        .cart-btn { background: var(--pink); color: white; border: none; padding: 10px 15px; border-radius: 50px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        .container { 
            max-width: 1200px; margin: 30px auto; display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 0 15px; 
        }

        .card { background: var(--white); border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #eee; }
        .card img { width: 100%; height: 180px; object-fit: contain; border-radius: 15px; margin-bottom: 10px; }

        /* Barra de Brinde */
        .area-brinde { padding: 15px 20px; background: #fff; border-bottom: 1px solid #eee; }
        .progress-container { background: #f0f0f0; border-radius: 50px; height: 12px; margin: 10px 0; overflow: hidden; border: 1px solid #eee; }
        .progress-bar { background: linear-gradient(90deg, var(--pink), #ff85a1); height: 100%; width: 0%; transition: 0.6s ease-in-out; }
        #brinde-msg { font-size: 12px; font-weight: 600; color: #444; }

        /* --- CORREÇÃO DO LOGIN ADM (ESCONDIDO POR PADRÃO) --- */
        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 30px; border-radius: 25px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); z-index: 3000; 
            width: 90%; max-width: 350px; display: none; 
        }

        /* --- CORREÇÃO DO BORRADO (REMOVIDO 100%) --- */
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.35); /* Escurece levemente o fundo */
            display: none; z-index: 1500; 
            backdrop-filter: none !important; /* Remove qualquer borrão */
            -webkit-backdrop-filter: none !important;
        }

        #painel-adm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; display: none; padding: 30px; overflow-y: auto; box-sizing: border-box; }

        .input-field { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Sidebar Carrinho */
        #sidebar { position: fixed; right: -100%; top: 0; width: 100%; max-width: 380px; height: 100%; background: var(--white); box-shadow: -5px 0 30px rgba(0,0,0,0.1); transition: 0.4s; z-index: 2000; display: flex; flex-direction: column; }
        #sidebar.active { right: 0; }
        .cart-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { padding: 20px; border-top: 1px solid #eee; background: white; }

        .item-carrinho { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 14px; }
        .qtd-btn { background: #eee; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; display: none; z-index: 9999; }
        .section-pedidos { max-width: 500px; margin: 40px auto; padding: 30px; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; display: none; }
    </style>
</head>
<body>

<div id="toast">Adicionado! ✨</div>
<div id="overlay" onclick="closeAll()"></div>

<header>
    <a href="#" class="logo">BELLA VITA</a>
    <div class="nav-right">
        <button class="btn-nav" onclick="irParaPedidos()">📦 Pedidos</button>
        <button class="btn-nav" id="adm-btn" onclick="abrirPainel()">ADM</button>
        <button class="btn-nav" id="user-display" onclick="openAuth()">Entrar</button>
        <button class="cart-btn" onclick="toggleCart()">🛒 <span id="cart-counter">0</span></button>
    </div>
</header>

<div id="sidebar">
    <div class="cart-header">
        <h2 style="margin:0;">Carrinho</h2>
        <button onclick="toggleCart()" style="border:none; background:none; font-size:24px; cursor:pointer;">✕</button>
    </div>
    <div class="area-brinde">
        <div id="brinde-msg">Faltam R$ 150,00 para liberar 7% OFF!</div>
        <div class="progress-container">
            <div class="progress-bar" id="cart-progress"></div>
        </div>
    </div>
    <div class="cart-items" id="lista-carrinho"></div>
    <div class="cart-footer">
        <input type="text" id="cupom-input" class="input-field" placeholder="Cupom (BELLA7 para +R$150)">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button class="btn-nav" style="flex: 2; height: 40px;" id="btn-aplicar" onclick="aplicarCupom()">Aplicar</button>
            <button class="btn-nav" style="flex: 1; height: 40px; border-color: #999; color: #999; display: none;" id="btn-remover" onclick="removerCupom()">Tirar</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span>Total:</span>
            <b style="font-size: 20px; color: var(--pink);">R$ <span id="total-val">0,00</span></b>
        </div>
        <button class="btn-main" style="background:var(--pix);" onclick="finalizarCompra()">FINALIZAR PIX</button>
    </div>
</div>

<div id="view-loja">
    <div class="container" id="vitrine"></div>
</div>

<div id="view-pedidos" class="section-pedidos">
    <h2>Acompanhar Pedido</h2>
    <input type="email" id="search-email" class="input-field" placeholder="Digite seu e-mail">
    <button class="btn-main" onclick="buscarPedido()">BUSCAR STATUS</button>
    <div id="status-resultado" style="margin-top:20px; padding:15px; border-radius:10px; display:none;"></div>
    <button class="btn-nav" onclick="voltarLoja()" style="margin-top: 20px; width: 100%;">Voltar para a Loja</button>
</div>

<div id="modal-auth" class="modal">
    <h2 style="text-align: center; margin-top: 0;">Login ADM</h2>
    <input type="email" id="auth-email" class="input-field" placeholder="E-mail">
    <input type="password" id="auth-pass" class="input-field" placeholder="Senha">
    <button class="btn-main" onclick="handleAuth()">ENTRAR</button>
</div>

<div id="painel-adm">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Painel ADM</h1>
        <button class="btn-nav" onclick="fecharPainel()">Sair</button>
    </div>
    <div style="background:#f9f9f9; padding:20px; border-radius:20px; margin: 20px 0;">
        <h3>Novo Produto</h3>
        <input type="text" id="new-name" class="input-field" placeholder="Nome">
        <input type="number" id="new-price" class="input-field" placeholder="Preço">
        <input type="text" id="new-img" class="input-field" placeholder="Link Imagem">
        <button class="btn-main" onclick="adicionarProduto()">CADASTRAR</button>
        <div id="lista-adm-produtos" style="margin-top: 15px;"></div>
    </div>
    <div style="background:#fff5f7; padding:20px; border-radius:20px;">
        <h3>Atualizar Pedido</h3>
        <input type="email" id="status-user-email" class="input-field" placeholder="E-mail do Cliente">
        <select id="status-user-txt" class="input-field">
            <option value="Estamos preparando seu pedido com muito carinho! 📦">Preparando</option>
            <option value="Seu pedido já foi postado e está a caminho! 🚚">Enviado</option>
            <option value="Pedido entregue! ✨">Entregue</option>
        </select>
        <button class="btn-main" style="background:#333;" onclick="atualizarStatusPedido()">SALVAR STATUS</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDx3WgtMugLF3GU2Q6ogNWRjHrYZxkY86o",
        authDomain: "bella-vita-5b290.firebaseapp.com",
        projectId: "bella-vita-5b290",
        storageBucket: "bella-vita-5b290.firebasestorage.app",
        messagingSenderId: "742105903566",
        appId: "1:742105903566:web:0e45401477d544dd4bbb9f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const produtosRef = ref(db, 'produtos');

    let produtos = [];
    let carrinho = [];
    let desconto = 0;
    let totalBruto = 0;

    onValue(produtosRef, (snapshot) => {
        produtos = snapshot.val() || [];
        renderizarTudo();
    });

    window.renderizarTudo = function() {
        const vitrine = document.getElementById('vitrine');
        const adm = document.getElementById('lista-adm-produtos');
        if(!vitrine) return;
        vitrine.innerHTML = ""; adm.innerHTML = "";
        produtos.forEach((p, i) => {
            vitrine.innerHTML += `<div class="card"><img src="${p.img}"><h4>${p.nome}</h4><p>R$ ${Number(p.preco).toFixed(2)}</p><button class="btn-main" onclick="addCarrinho(${i})">COMPRAR</button></div>`;
            adm.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${p.nome}</span><button onclick="removerProduto(${i})" style="color:red; border:none; background:none;">Excluir</button></div>`;
        });
    }

    window.atualizarCarrinhoUI = () => {
        const lista = document.getElementById('lista-carrinho');
        const totalTxt = document.getElementById('total-val');
        const bar = document.getElementById('cart-progress');
        const msg = document.getElementById('brinde-msg');
        lista.innerHTML = ""; totalBruto = 0; let itens = 0;
        carrinho.forEach((item, i) => {
            totalBruto += item.preco * item.qtd; itens += item.qtd;
            lista.innerHTML += `<div class="item-carrinho"><span>${item.nome} (x${item.qtd})</span><div><button class="qtd-btn" onclick="mudarQtd(${i},-1)">-</button> <button class="qtd-btn" onclick="mudarQtd(${i},1)">+</button></div></div>`;
        });
        let progresso = (totalBruto / 150) * 100;
        bar.style.width = Math.min(progresso, 100) + "%";
        if(totalBruto < 150) {
            msg.innerHTML = `Faltam <b>R$ ${(150 - totalBruto).toFixed(2)}</b> para liberar 7% OFF!`;
            msg.style.color = "#444";
        } else {
            msg.innerHTML = `🎉 PARABÉNS! Use o cupom <b>BELLA7</b>!`;
            msg.style.color = "var(--pink)";
        }
        const valorFinal = totalBruto - (totalBruto * (desconto / 100));
        totalTxt.innerText = valorFinal.toFixed(2).replace('.', ',');
        document.getElementById('cart-counter').innerText = itens;
    }

    // --- FUNÇÕES DE INTERFACE ---
    window.openAuth = () => { 
        document.getElementById('modal-auth').style.display = 'block'; 
        document.getElementById('overlay').style.display = 'block'; 
    }

    window.closeAll = () => { 
        document.getElementById('modal-auth').style.display = 'none'; 
        document.getElementById('sidebar').classList.remove('active'); 
        document.getElementById('overlay').style.display = 'none'; 
    }

    window.toggleCart = () => { 
        const s = document.getElementById('sidebar');
        s.classList.toggle('active');
        document.getElementById('overlay').style.display = s.classList.contains('active') ? 'block' : 'none';
    }

    window.handleAuth = () => { 
        if(document.getElementById('auth-email').value === "feradm@gmail.com" && document.getElementById('auth-pass').value === "27112010") { 
            document.getElementById('adm-btn').style.display = "block"; 
            closeAll(); 
        } else { alert("Senha incorreta!"); } 
    }

    // --- RESTANTE DAS FUNÇÕES (PRODUTOS/PEDIDOS) ---
    window.addCarrinho = (i) => {
        const p = produtos[i];
        const jaTem = carrinho.find(item => item.nome === p.nome);
        if(jaTem) jaTem.qtd++; else carrinho.push({...p, qtd: 1});
        document.getElementById('toast').style.display = 'block';
        setTimeout(() => document.getElementById('toast').style.display = 'none', 1500);
        atualizarCarrinhoUI();
    }
    window.aplicarCupom = () => {
        const c = document.getElementById('cupom-input').value.trim().toUpperCase();
        if (c === "BELLA7" && totalBruto >= 150) { desconto = 7; alert("Cupom aplicado!"); }
        else if (c === "AMOVCFER") { desconto = 100; }
        else { return alert("Inválido ou valor insuficiente!"); }
        document.getElementById('btn-remover').style.display = "block";
        document.getElementById('btn-aplicar').disabled = true;
        atualizarCarrinhoUI();
    }
    window.mudarQtd = (i, n) => { carrinho[i].qtd += n; if(carrinho[i].qtd <= 0) carrinho.splice(i, 1); atualizarCarrinhoUI(); }
    window.removerCupom = () => { desconto = 0; document.getElementById('btn-remover').style.display = "none"; document.getElementById('btn-aplicar').disabled = false; atualizarCarrinhoUI(); }
    window.abrirPainel = () => document.getElementById('painel-adm').style.display='block';
    window.fecharPainel = () => document.getElementById('painel-adm').style.display='none';
    window.irParaPedidos = () => { document.getElementById('view-loja').style.display='none'; document.getElementById('view-pedidos').style.display='block'; }
    window.voltarLoja = () => { document.getElementById('view-loja').style.display='block'; document.getElementById('view-pedidos').style.display='none'; }
    window.adicionarProduto = () => {
        const n = document.getElementById('new-name').value; const p = parseFloat(document.getElementById('new-price').value); const i = document.getElementById('new-img').value;
        if(n && p) { produtos.push({nome:n, preco:p, img:i}); set(produtosRef, produtos); }
    }
    window.removerProduto = (i) => { if(confirm("Apagar?")) { produtos.splice(i, 1); set(produtosRef, produtos); } }
    window.buscarPedido = function() {
        const emailKey = document.getElementById('search-email').value.trim().toLowerCase().replace(/\./g, '_');
        const res = document.getElementById('status-resultado');
        get(child(ref(db), `pedidos/${emailKey}`)).then((snap) => {
            res.style.display = "block";
            if (snap.exists()) { res.innerHTML = `✅ ${snap.val().status}`; res.style.background = "#f0fdf4"; }
            else { res.innerHTML = "❌ Não encontrado."; res.style.background = "#fee2e2"; }
        });
    }
    window.atualizarStatusPedido = function() {
        const emailKey = document.getElementById('status-user-email').value.trim().toLowerCase().replace(/\./g, '_');
        const status = document.getElementById('status-user-txt').value;
        set(ref(db, `pedidos/${emailKey}`), { status: status }).then(() => alert("Salvo!"));
    }
    window.finalizarCompra = () => { window.location.href = `https://wa.me/556499923612?text=Olá! Pedido de R$ ${document.getElementById('total-val').innerText}`; }
</script>
</body>
</html>
