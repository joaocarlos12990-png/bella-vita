<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Vita | Loja Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff4d6d; --fundo: #fffafa; --white: #ffffff; --green: #25d366; --pix: #32bcad; }
        body { font-family: 'Poppins', sans-serif; background: var(--fundo); margin: 0; color: #333; }
        header { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--pink); text-decoration: none; font-weight: bold; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .btn-nav { background: none; border: 2px solid var(--pink); color: var(--pink); padding: 8px 18px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.3s; }
        .btn-nav:hover { background: var(--pink); color: white; }
        #adm-btn { background: #333; color: white; border: none; display: none; }
        .cart-btn { background: var(--pink); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        
        #sidebar { position: fixed; right: -400px; top: 0; width: 380px; height: 100%; background: var(--white); box-shadow: -5px 0 30px rgba(0,0,0,0.1); transition: 0.4s; z-index: 2000; padding: 30px; display: flex; flex-direction: column; box-sizing: border-box; }
        #sidebar.active { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin: 15px 0; border-top: 1px solid #eee; }
        
        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 0 20px; }
        .card { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 220px; object-fit: contain; background: #fff; border-radius: 15px; margin-bottom: 10px; }
        
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 35px; border-radius: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); z-index: 3000; width: 350px; display: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; backdrop-filter: blur(3px); }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; }
        #painel-adm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; display: none; padding: 40px; overflow-y: auto; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #4CAF50; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; z-index: 9999; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="toast">Produto adicionado! ✅</div>
<div id="overlay" onclick="window.closeAll()"></div>

<header>
    <a href="#" class="logo">BELLA VITA</a>
    <div class="nav-right">
        <button class="btn-nav" id="adm-btn" onclick="window.abrirPainel()">Painel ADM</button>
        <button class="btn-nav" id="user-display" onclick="window.openAuth()">Entrar</button>
        <button class="cart-btn" onclick="window.toggleCart()">🛒 <span id="cart-counter">0</span></button>
    </div>
</header>

<div class="container" id="vitrine">
    <p style="text-align: center; grid-column: 1/-1;">Sincronizando com o Firebase...</p>
</div>

<div id="modal-auth" class="modal">
    <h2 style="text-align: center; color: var(--pink);">Login ADM</h2>
    <input type="email" id="auth-email" class="input-field" placeholder="E-mail">
    <input type="password" id="auth-pass" class="input-field" placeholder="Senha">
    <button class="btn-main" onclick="window.handleAuth()">ENTRAR</button>
</div>

<div id="painel-adm">
    <div style="max-width: 800px; margin: 0 auto;">
        <h1>Gerenciador Bella Vita</h1>
        <button class="btn-nav" onclick="window.fecharPainel()">Voltar para Loja</button>
        <div style="background: #f9f9f9; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #eee;">
            <h3>Novo Produto</h3>
            <input type="text" id="new-name" class="input-field" placeholder="Nome">
            <input type="number" id="new-price" class="input-field" placeholder="Preço (Ex: 25.50)">
            <input type="text" id="new-img" class="input-field" placeholder="Link da Imagem">
            <button class="btn-main" onclick="window.adicionarProduto()">CADASTRAR PRODUTO</button>
        </div>
        <div id="lista-adm-produtos"></div>
    </div>
</div>

<div id="sidebar">
    <h2>Seu Carrinho</h2>
    <div class="cart-items" id="lista-carrinho"></div>
    <div style="margin-top: auto;">
        <p id="total-txt" style="font-size: 18px; font-weight: bold;">Total: R$ <span id="total-val">0,00</span></p>
        <button class="btn-main" style="background: var(--pix);" onclick="window.abrirPagamento()">FINALIZAR PIX</button>
        <button class="btn-nav" style="width: 100%; margin-top: 10px; border: none;" onclick="window.toggleCart()">Continuar Comprando</button>
    </div>
</div>

<div id="modal-pix" class="modal">
    <h2 style="text-align: center; color: var(--pix);">Pagamento PIX</h2>
    <p style="text-align: center;">Chave: <b>fv3029483@gmail.com</b></p>
    <a id="btn-comprovante" target="_blank" class="btn-main" style="background: var(--green); text-decoration: none; display: block; text-align: center;">ENVIAR COMPROVANTE</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDx3WgtMugLF3GU2Q6ogNWRjHrYZxkY86o",
        authDomain: "bella-vita-5b290.firebaseapp.com",
        projectId: "bella-vita-5b290",
        storageBucket: "bella-vita-5b290.firebasestorage.app",
        messagingSenderId: "742105903566",
        appId: "1:742105903566:web:0e45401477d544dd4bbb9f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const produtosRef = ref(db, 'produtos');

    let produtos = [];
    let carrinho = [];

    // --- SINCRONIZAÇÃO ---
    onValue(produtosRef, (snapshot) => {
        produtos = snapshot.val() || [];
        window.atualizarInterface();
    });

    window.atualizarInterface = function() {
        const vitrine = document.getElementById('vitrine');
        const listaAdm = document.getElementById('lista-adm-produtos');
        if(!vitrine || !listaAdm) return;

        vitrine.innerHTML = "";
        listaAdm.innerHTML = "<h3>Produtos na Nuvem:</h3>";

        produtos.forEach((p, i) => {
            vitrine.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <h3>${p.nome}</h3>
                    <p>R$ ${p.preco.toFixed(2)}</p>
                    <button class="btn-main" onclick="window.addNoCarrinho(${i})">COMPRAR</button>
                </div>`;
            
            listaAdm.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee;">
                    <span>${p.nome}</span>
                    <button onclick="window.removerProduto(${i})" style="color:red; border:none; background:none; cursor:pointer;">Excluir</button>
                </div>`;
        });
    };

    // --- FUNÇÕES GLOBAIS ---
    window.handleAuth = function() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        if(email === "feradm@gmail.com" && pass === "27112010") {
            document.getElementById('adm-btn').style.display = "block";
            document.getElementById('user-display').innerText = "Painel Ativo";
            window.closeAll();
        } else {
            alert("Acesso negado! Verifique o e-mail e a senha 27112010.");
        }
    };

    window.adicionarProduto = function() {
        const n = document.getElementById('new-name').value;
        const p = parseFloat(document.getElementById('new-price').value);
        const i = document.getElementById('new-img').value;
        if(n && p) {
            produtos.push({ nome: n, preco: p, img: i || 'https://via.placeholder.com/150' });
            set(produtosRef, produtos);
            document.getElementById('new-name').value = "";
            document.getElementById('new-price').value = "";
        }
    };

    window.removerProduto = function(index) {
        if(confirm("Remover este produto da nuvem?")) {
            produtos.splice(index, 1);
            set(produtosRef, produtos);
        }
    };

    window.addNoCarrinho = function(index) {
        const p = produtos[index];
        const jaTem = carrinho.find(item => item.nome === p.nome);
        if(jaTem) jaTem.qtd++; else carrinho.push({...p, qtd: 1});
        
        document.getElementById('toast').style.display = "block";
        setTimeout(() => document.getElementById('toast').style.display = "none", 2000);
        window.renderizarCarrinho();
    };

    window.renderizarCarrinho = function() {
        const lista = document.getElementById('lista-carrinho');
        const totalVal = document.getElementById('total-val');
        const cont = document.getElementById('cart-counter');
        let total = 0;
        let itensTotal = 0;
        
        lista.innerHTML = "";
        carrinho.forEach((item, i) => {
            total += item.preco * item.qtd;
            itensTotal += item.qtd;
            lista.innerHTML += `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${item.nome} (x${item.qtd})</span>
                    <b>R$ ${(item.preco * item.qtd).toFixed(2)}</b>
                </div>`;
        });

        if(totalVal) totalVal.innerText = total.toFixed(2).replace('.', ',');
        if(cont) cont.innerText = itensTotal;
    };

    window.abrirPagamento = function() {
        const total = document.getElementById('total-val').innerText;
        document.getElementById('btn-comprovante').href = `https://wa.me/556499923612?text=Olá! Fiz o pagamento de R$ ${total} na Bella Vita.`;
        document.getElementById('modal-pix').style.display = "block";
        document.getElementById('overlay').style.display = "block";
    };

    window.openAuth = () => { document.getElementById('modal-auth').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; };
    window.closeAll = () => {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay').style.display = 'none';
    };
    window.abrirPainel = () => document.getElementById('painel-adm').style.display = "block";
    window.fecharPainel = () => document.getElementById('painel-adm').style.display = "none";
    window.toggleCart = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
    };
</script>
</body>
</html>
