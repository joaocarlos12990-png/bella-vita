<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Vita | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff4d6d; --fundo: #fffafa; --white: #ffffff; --green: #25d366; --pix: #32bcad; }
        body { font-family: 'Poppins', sans-serif; background: var(--fundo); margin: 0; padding: 0; }
        header { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--pink); text-decoration: none; font-weight: bold; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .btn-nav { background: none; border: 2px solid var(--pink); color: var(--pink); padding: 8px 18px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 13px; }
        #adm-btn { background: #333; color: white; border: none; display: none; }
        .cart-btn { background: var(--pink); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 0 20px; }
        .card { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .card img { width: 100%; height: 220px; object-fit: contain; border-radius: 15px; margin-bottom: 10px; }
        #sidebar { position: fixed; right: -400px; top: 0; width: 380px; height: 100%; background: var(--white); box-shadow: -5px 0 30px rgba(0,0,0,0.1); transition: 0.4s; z-index: 2000; padding: 30px; display: flex; flex-direction: column; box-sizing: border-box; }
        #sidebar.active { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin-top: 20px; }
        .item-carrinho { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .qtd-btn { background: #eee; border: none; width: 25px; height: 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 35px; border-radius: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); z-index: 3000; width: 350px; display: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; backdrop-filter: blur(3px); }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #painel-adm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; display: none; padding: 40px; overflow-y: auto; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 25px; border-radius: 50px; font-weight: bold; display: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="toast">Item adicionado! ✨</div>
<div id="overlay" onclick="closeAll()"></div>

<header>
    <a href="#" class="logo">BELLA VITA</a>
    <div class="nav-right">
        <button class="btn-nav" id="adm-btn" onclick="abrirPainel()">Painel ADM</button>
        <button class="btn-nav" id="user-display" onclick="openAuth()">Entrar</button>
        <button class="cart-btn" onclick="toggleCart()">🛒 <span id="cart-counter">0</span></button>
    </div>
</header>

<div class="container" id="vitrine"></div>

<div id="modal-auth" class="modal">
    <h2 style="text-align: center;">Login ADM</h2>
    <input type="email" id="auth-email" class="input-field" placeholder="E-mail">
    <input type="password" id="auth-pass" class="input-field" placeholder="Senha">
    <button class="btn-main" onclick="handleAuth()">ENTRAR</button>
</div>

<div id="painel-adm">
    <h1>Gerenciar Loja</h1>
    <button class="btn-nav" onclick="fecharPainel()">Voltar</button>
    <div style="background:#f9f9f9; padding:20px; border-radius:15px; margin:20px 0; border:1px solid #eee;">
        <input type="text" id="new-name" class="input-field" placeholder="Nome">
        <input type="number" id="new-price" class="input-field" placeholder="Preço">
        <input type="text" id="new-img" class="input-field" placeholder="Link da Imagem">
        <button class="btn-main" onclick="adicionarProduto()">CADASTRAR</button>
    </div>
    <div id="lista-adm-produtos"></div>
</div>

<div id="sidebar">
    <h2>Carrinho</h2>
    <div class="cart-items" id="lista-carrinho"></div>
    <div style="margin-top: auto; border-top: 1px solid #eee; padding-top: 15px;">
        <input type="text" id="cupom-input" class="input-field" placeholder="Cupom (5%) ou ADM">
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button class="btn-nav" style="flex: 1;" onclick="aplicarCupom()">Aplicar</button>
            <button class="btn-nav" style="flex: 1; border-color: #999; color: #999;" onclick="removerCupom()">Remover</button>
        </div>
        <p>Total: <b>R$ <span id="total-val">0,00</span></b></p>
        <button class="btn-main" style="background:var(--pix);" onclick="finalizarCompra()">FINALIZAR PIX</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDx3WgtMugLF3GU2Q6ogNWRjHrYZxkY86o",
        authDomain: "bella-vita-5b290.firebaseapp.com",
        projectId: "bella-vita-5b290",
        storageBucket: "bella-vita-5b290.firebasestorage.app",
        messagingSenderId: "742105903566",
        appId: "1:742105903566:web:0e45401477d544dd4bbb9f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const produtosRef = ref(db, 'produtos');

    let produtos = [];
    let carrinho = [];
    let desconto = 0;

    onValue(produtosRef, (snapshot) => {
        produtos = snapshot.val() || [];
        renderizarTudo();
    });

    window.renderizarTudo = function() {
        const vitrine = document.getElementById('vitrine');
        const adm = document.getElementById('lista-adm-produtos');
        if(!vitrine || !adm) return;
        vitrine.innerHTML = ""; adm.innerHTML = "";
        produtos.forEach((p, i) => {
            vitrine.innerHTML += `<div class="card">
                <img src="${p.img || 'https://via.placeholder.com/150'}">
                <h3>${p.nome}</h3>
                <p>R$ ${Number(p.preco).toFixed(2)}</p>
                <button class="btn-main" onclick="addCarrinho(${i})">COMPRAR</button>
            </div>`;
            adm.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                <span>${p.nome}</span>
                <button onclick="removerProduto(${i})" style="color:red; border:none; background:none; cursor:pointer;">Excluir</button>
            </div>`;
        });
    }

    window.addCarrinho = function(i) {
        const p = produtos[i];
        const jaTem = carrinho.find(item => item.nome === p.nome);
        if(jaTem) jaTem.qtd++; else carrinho.push({...p, qtd: 1});
        
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
        atualizarCarrinhoUI();
    }

    window.atualizarCarrinhoUI = function() {
        const lista = document.getElementById('lista-carrinho');
        const totalTxt = document.getElementById('total-val');
        const contador = document.getElementById('cart-counter');
        lista.innerHTML = "";
        let total = 0;
        let itens = 0;

        carrinho.forEach((item, i) => {
            total += item.preco * item.qtd;
            itens += item.qtd;
            lista.innerHTML += `<div class="item-carrinho">
                <span>${item.nome}</span>
                <div>
                    <button class="qtd-btn" onclick="mudarQtd(${i}, -1)">-</button>
                    <span style="margin: 0 5px;">${item.qtd}</span>
                    <button class="qtd-btn" onclick="mudarQtd(${i}, 1)">+</button>
                </div>
            </div>`;
        });

        const valorFinal = total - (total * (desconto / 100));
        totalTxt.innerText = valorFinal.toFixed(2).replace('.', ',');
        contador.innerText = itens;
    }

    window.mudarQtd = (i, n) => { carrinho[i].qtd += n; if(carrinho[i].qtd <= 0) carrinho.splice(i, 1); atualizarCarrinhoUI(); }

    window.aplicarCupom = () => {
        const c = document.getElementById('cupom-input').value.trim().toUpperCase();
        const isAdmin = document.getElementById('adm-btn').style.display === "block";
        if (c === "AMOR" && isAdmin) {
            desconto = 100; alert("Cupom ADM Ativado! 100% OFF");
        } else if (c === "BELLA5" || c === "FER5") {
            desconto = 5; alert("5% de desconto aplicado!");
        } else {
            desconto = 0; alert("Cupom inválido ou sem permissão ADM.");
        }
        atualizarCarrinhoUI();
    }

    window.removerCupom = () => { desconto = 0; document.getElementById('cupom-input').value = ""; atualizarCarrinhoUI(); }

    window.adicionarProduto = () => {
        const n = document.getElementById('new-name').value;
        const p = parseFloat(document.getElementById('new-price').value);
        const i = document.getElementById('new-img').value;
        if(n && p) { produtos.push({nome:n, preco:p, img:i}); set(produtosRef, produtos); }
    }

    window.removerProduto = (i) => { if(confirm("Apagar?")) { produtos.splice(i, 1); set(produtosRef, produtos); } }

    window.handleAuth = () => {
        if(document.getElementById('auth-email').value === "feradm@gmail.com" && document.getElementById('auth-pass').value === "27112010") {
            document.getElementById('adm-btn').style.display = "block";
            closeAll();
        } else { alert("Acesso negado!"); }
    }

    window.openAuth = () => { document.getElementById('modal-auth').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    window.toggleCart = () => { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none'; }
    window.closeAll = () => { document.getElementById('modal-auth').style.display='none'; document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
    window.abrirPainel = () => document.getElementById('painel-adm').style.display='block';
    window.fecharPainel = () => document.getElementById('painel-adm').style.display='none';
    window.finalizarCompra = () => { window.location.href = `https://wa.me/556499923612?text=Olá! Fiz um pedido de R$ ${document.getElementById('total-val').innerText}`; }
</script>
</body>
</html>
