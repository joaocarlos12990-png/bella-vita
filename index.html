<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Vita | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff4d6d; --fundo: #fffafa; --white: #ffffff; --green: #25d366; --pix: #32bcad; }
        body { font-family: 'Poppins', sans-serif; background: var(--fundo); margin: 0; color: #333; }
        header { background: var(--white); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--pink); text-decoration: none; font-weight: bold; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .btn-nav { background: none; border: 2px solid var(--pink); color: var(--pink); padding: 8px 18px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 13px; }
        #adm-btn { background: #333; color: white; border: none; display: none; }
        .cart-btn { background: var(--pink); color: white; border: none; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        
        #sidebar { position: fixed; right: -400px; top: 0; width: 380px; height: 100%; background: var(--white); box-shadow: -5px 0 30px rgba(0,0,0,0.1); transition: 0.4s; z-index: 2000; padding: 30px; display: flex; flex-direction: column; box-sizing: border-box; }
        #sidebar.active { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin: 15px 0; border-top: 1px solid #eee; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        
        .container { max-width: 1200px; margin: 40px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; padding: 0 20px; }
        .card { background: var(--white); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid #eee; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 220px; object-fit: contain; background: #fff; border-radius: 15px; margin-bottom: 10px; }
        
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 35px; border-radius: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); z-index: 3000; width: 350px; display: none; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; z-index: 1500; backdrop-filter: blur(3px); }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--pink); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #painel-adm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 5000; display: none; padding: 40px; overflow-y: auto; }
    </style>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>
<body>

<div id="overlay" onclick="closeAll()"></div>

<header>
    <a href="#" class="logo">BELLA VITA</a>
    <div class="nav-right">
        <button class="btn-nav" id="adm-btn" onclick="abrirPainel()">Painel ADM</button>
        <button class="btn-nav" id="user-display" onclick="openAuth()">Entrar</button>
        <button class="cart-btn" onclick="toggleCart()">🛒 <span id="cart-counter">0</span></button>
    </div>
</header>

<div class="container" id="vitrine">
    <p style="text-align: center; grid-column: 1/-1;">Carregando produtos...</p>
</div>

<div id="modal-auth" class="modal">
    <h2 style="text-align: center; color: var(--pink);">Login ADM</h2>
    <input type="email" id="auth-email" class="input-field" placeholder="E-mail">
    <input type="password" id="auth-pass" class="input-field" placeholder="Senha">
    <button class="btn-main" onclick="handleAuth()">ENTRAR</button>
</div>

<div id="painel-adm">
    <div style="max-width: 800px; margin: 0 auto;">
        <h1>Gerenciar Loja Sincronizada</h1>
        <button class="btn-nav" onclick="fecharPainel()">Sair do Painel</button>
        <div style="background: #f9f9f9; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #eee;">
            <h3>Adicionar Novo Produto</h3>
            <input type="text" id="new-name" class="input-field" placeholder="Nome do Produto">
            <input type="number" id="new-price" class="input-field" placeholder="Preço (Ex: 19.90)">
            <input type="text" id="new-img" class="input-field" placeholder="Link da Imagem (URL)">
            <button class="btn-main" onclick="adicionarProduto()">ADICIONAR À NUVEM</button>
        </div>
        <h3>Produtos Ativos</h3>
        <div id="lista-adm-produtos"></div>
    </div>
</div>

<div id="sidebar">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">Carrinho</h2>
        <button onclick="toggleCart()" style="background: none; border: none; font-size: 32px; color: var(--pink); cursor: pointer; padding: 5px 10px;">&times;</button>
    </div>
    
    <div class="cart-items" id="lista-carrinho"></div>
    
    <div style="margin-top: auto; padding-top: 20px;">
        <input type="text" id="cupom-input" class="input-field" placeholder="Cupom: BELLA2026">
        <button class="btn-main" style="padding: 10px; margin-bottom: 10px;" onclick="aplicarCupom()">Aplicar Cupom</button>
        <p id="total-txt" style="font-size: 18px; font-weight: bold;">Total: R$ <span id="total-val">0,00</span></p>
        <button class="btn-main" style="background: var(--pix);" onclick="abrirPagamento()">PAGAR COM PIX</button>
    </div>
</div>

<div id="modal-pix" class="modal">
    <h2 style="text-align: center; color: var(--pix);">Pagamento PIX</h2>
    <div style="text-align: center;">
        <p>Chave: <b>fv3029483@gmail.com</b></p>
        <p>Após pagar, envie o comprovante:</p>
    </div>
    <a id="btn-comprovante" target="_blank" class="btn-main" style="background: var(--green); text-decoration: none; display: block; text-align: center;">ENVIAR NO WHATSAPP</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDx3WgtMugLF3GU2Q6ogNWRjHrYZxkY86o",
        authDomain: "bella-vita-5b290.firebaseapp.com",
        projectId: "bella-vita-5b290",
        storageBucket: "bella-vita-5b290.firebasestorage.app",
        messagingSenderId: "742105903566",
        appId: "1:742105903566:web:0e45401477d544dd4bbb9f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const produtosRef = ref(db, 'produtos');

    let produtos = [];
    let carrinho = [];
    let cupomAtivo = false;

    // Sincronização em Tempo Real (A mágica acontece aqui)
    onValue(produtosRef, (snapshot) => {
        const data = snapshot.val();
        produtos = data || [];
        renderizar();
    });

    window.renderizar = function() {
        const v = document.getElementById('vitrine');
        const adm = document.getElementById('lista-adm-produtos');
        v.innerHTML = ""; adm.innerHTML = "";
        
        if (produtos.length === 0) {
            v.innerHTML = "<p>Nenhum produto cadastrado.</p>";
        }

        produtos.forEach((p, index) => {
            v.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <h3>${p.nome}</h3>
                    <p>R$ ${p.preco.toFixed(2)}</p>
                    <button class="btn-main" onclick="addAoCarrinho(${index})">COMPRAR</button>
                </div>`;
            
            adm.innerHTML += `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <span>${p.nome} - R$ ${p.preco.toFixed(2)}</span>
                    <button onclick="removerProduto(${index})" style="color:red; border:none; background:none; cursor:pointer;">Excluir</button>
                </div>`;
        });
    }

    window.adicionarProduto = function() {
        const n = document.getElementById('new-name').value;
        const p = parseFloat(document.getElementById('new-price').value);
        const i = document.getElementById('new-img').value;

        if (n && p) {
            produtos.push({ nome: n, preco: p, img: i || 'https://via.placeholder.com/150' });
            set(produtosRef, produtos); // Salva na nuvem e atualiza todos os celulares
            document.getElementById('new-name').value = "";
            document.getElementById('new-price').value = "";
            document.getElementById('new-img').value = "";
        } else {
            alert("Preencha nome e preço!");
        }
    }

    window.removerProduto = function(index) {
        if(confirm("Deseja excluir este produto da loja inteira?")) {
            produtos.splice(index, 1);
            set(produtosRef, produtos);
        }
    }

    // Funções do Carrinho
    window.addAoCarrinho = function(index) {
        carrinho.push(produtos[index]);
        atualizarCarrinho();
        toggleCart();
    }

    window.removerDoCarrinho = function(index) {
        carrinho.splice(index, 1);
        atualizarCarrinho();
    }

    function atualizarCarrinho() {
        const lista = document.getElementById('lista-carrinho');
        let subtotal = 0;
        lista.innerHTML = "";
        carrinho.forEach((i, idx) => {
            subtotal += i.preco;
            lista.innerHTML += `<div class="item-row"><span>${i.nome}</span> <b>R$ ${i.preco.toFixed(2)}</b> <span onclick="removerDoCarrinho(${idx})" style="cursor:pointer; color:red;">✖</span></div>`;
        });
        document.getElementById('cart-counter').innerText = carrinho.length;
        let total = cupomAtivo ? subtotal * 0.95 : subtotal;
        document.getElementById('total-val').innerText = total.toFixed(2);
    }

    window.aplicarCupom = function() {
        if(document.getElementById('cupom-input').value.toUpperCase() === "BELLA2026") {
            cupomAtivo = true; atualizarCarrinho(); alert("Cupom de 5% aplicado!");
        } else { alert("Cupom inválido!"); }
    }

    window.abrirPagamento = function() {
        const total = document.getElementById('total-val').innerText;
        document.getElementById('btn-comprovante').href = `https://wa.me/556499923612?text=Olá! Fiz o pagamento de R$ ${total} na Bella Vita. Segue comprovante:`;
        document.getElementById('modal-pix').style.display = "block";
        document.getElementById('overlay').style.display = "block";
    }

    // Funções de Interface
    window.handleAuth = function() {
        const e = document.getElementById('auth-email').value, s = document.getElementById('auth-pass').value;
        if(e === "feradm@gmail.com" && s === "27112010") {
            document.getElementById('adm-btn').style.display = "block";
            document.getElementById('user-display').innerText = "ADM Logado";
            closeAll();
        } else { alert("Dados incorretos!"); }
    }

    window.abrirPainel = () => document.getElementById('painel-adm').style.display = "block";
    window.fecharPainel = () => document.getElementById('painel-adm').style.display = "none";
    window.toggleCart = () => { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').style.display = document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none'; }
    window.openAuth = () => { document.getElementById('modal-auth').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    window.closeAll = () => { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('sidebar').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
</script>

</body>
</html>
